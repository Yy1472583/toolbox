  <div class="calc-page">
    <div class="calc-card">
      <h1 class="calc-title">🏦 贷款计算器</h1>
      <p class="calc-desc">对比等额本息与等额本金两种还款方式，看清每月月供、还款总额与利息差异。</p>

      <div class="calc-field">
        <label>贷款金额（元）</label>
        <input type="number" id="lamt" value="200000" min="0" step="1000" />
      </div>
      <div class="calc-grid">
        <div class="calc-field">
          <label>年利率（%）</label>
          <input type="number" id="lrate" value="6" min="0" step="0.01" />
        </div>
        <div class="calc-field">
          <label>期限（月）</label>
          <input type="number" id="lmonths" value="36" min="1" step="1" />
        </div>
      </div>

      <div class="btn-row">
        <button class="btn" id="calcBtn">计算</button>
        <button class="btn btn-ghost" id="resetBtn">重置</button>
      </div>

      <div class="calc-result" id="result">请输入参数后点击「计算」。</div>

      <p class="calc-note">
        等额本息每月还款固定、压力均衡；等额本金首月还款最高、逐月递减、总利息更少。两种方式的本金总额相同，差异仅在利息与现金流安排。

  <script>
  function fmt(n) { return '¥' + (Math.round(n * 100) / 100).toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
  function calc() {
    var P = parseFloat(lamt.value) || 0;
    var r = (parseFloat(lrate.value) || 0) / 100 / 12;
    var n = parseInt(lmonths.value, 10) || 0;
    var res = document.getElementById('result');
    if (!(P > 0) || !(n > 0)) { res.textContent = '请输入有效的贷款金额与期限。'; return; }

    // 等额本息
    var f = Math.pow(1 + r, n);
    var emi = r === 0 ? P / n : P * r * f / (f - 1);
    var emiTotal = emi * n;
    var emiInt = emiTotal - P;

    // 等额本金
    var per = P / n;
    var epFirst = per + P * r;
    var epDec = per * r;
    var epInt = P * r * (n + 1) / 2;
    var epTotal = P + epInt;

    var save = emiInt - epInt;
    res.innerHTML =
      '<div class="line"><span class="k">等额本息 · 月供</span><span class="v">' + fmt(emi) + '</span></div>' +
      '<div class="line"><span class="k">等额本息 · 还款总额</span><span class="v">' + fmt(emiTotal) + '</span></div>' +
      '<div class="line"><span class="k">等额本息 · 利息总额</span><span class="v hl">' + fmt(emiInt) + '</span></div>' +
      '<div class="line" style="margin-top:8px"><span class="k">等额本金 · 首月月供</span><span class="v">' + fmt(epFirst) + '</span></div>' +
      '<div class="line"><span class="k">等额本金 · 每月递减</span><span class="v">' + fmt(epDec) + '</span></div>' +
      '<div class="line"><span class="k">等额本金 · 利息总额</span><span class="v hl">' + fmt(epInt) + '</span></div>' +
      '<div class="line" style="margin-top:8px"><span class="k">等额本金比本息少付利息</span><span class="v hl">' + fmt(Math.max(0, save)) + '</span></div>';
  }
  document.getElementById('calcBtn').addEventListener('click', calc);
  document.getElementById('resetBtn').addEventListener('click', function () {
    lamt.value = 200000; lrate.value = 6; lmonths.value = 36;
    document.getElementById('result').textContent = '请输入参数后点击「计算」。';
  });
  document.getElementById('year').textContent = new Date().getFullYear();
  </script>
