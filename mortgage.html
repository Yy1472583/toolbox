<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>房贷计算器 - 实用工具箱</title>
  <meta name="description" content="在线房贷计算器：输入贷款金额、年利率与贷款年限，自动计算等额本息 / 等额本金两种还款方式的月供、还款总额与利息总额，帮您提前规划购房预算。" />
  <meta name="keywords" content="房贷计算器,月供计算,等额本息,等额本金,买房贷款,房贷利息" />
  <link rel="canonical" href="https://www.hajimimanbo.cloud/mortgage.html" />
  <link rel="stylesheet" href="style.css" />
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "房贷计算器",
    "applicationCategory": "CalculatorApplication",
    "operatingSystem": "Web",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "CNY" },
    "url": "https://www.hajimimanbo.cloud/mortgage.html"
  }
  </script>
  <!-- Google AdSense（已接入：发布商 ca-pub-7981362795928481） -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7981362795928481" crossorigin="anonymous"></script>
</head>
<body>

  <header class="site-header">
    <div class="brand">
      <span class="brand-logo">🧰</span>
      <span class="brand-name">实用工具箱</span>
    </div>
    <nav class="top-nav">
      <a href="index.html">← 返回工具箱</a>
    </nav>
  </header>

  <div class="calc-page">
    <div class="calc-card">
      <h1 class="calc-title">💰 房贷计算器</h1>
      <p class="calc-desc">输入贷款信息，计算等额本息 / 等额本金两种还款方式的月供、还款总额与利息总额。</p>

      <div class="calc-field">
        <label>贷款金额（万元）</label>
        <input type="number" id="amount" value="100" min="0" step="1" />
      </div>
      <div class="calc-grid">
        <div class="calc-field">
          <label>年利率（%）</label>
          <input type="number" id="rate" value="4.2" min="0" step="0.01" />
        </div>
        <div class="calc-field">
          <label>贷款年限（年）</label>
          <input type="number" id="years" value="30" min="1" step="1" />
        </div>
      </div>
      <div class="calc-field">
        <label>还款方式</label>
        <select id="method">
          <option value="emi">等额本息（每月还款额固定）</option>
          <option value="ep">等额本金（每月递减）</option>
        </select>
      </div>

      <div class="btn-row">
        <button class="btn" id="calcBtn">计算</button>
        <button class="btn btn-ghost" id="resetBtn">重置</button>
      </div>

      <div class="calc-result" id="result">请输入参数后点击「计算」。</div>

      <p class="calc-note">
        说明：本计算器按商业银行按揭贷款常规公式估算，结果仅供参考，实际以放款银行核算为准。等额本息每月还款额固定、前期利息占比高；等额本金首月还款最多、之后逐月递减，总利息更少。
      </p>
    </div>

    <div class="related">
      <h3>相关计算器</h3>
      <a href="bmi.html">BMI 计算器</a>
      <a href="tax.html">个税计算器</a>
      <a href="compound.html">复利计算器</a>
      <a href="loan.html">贷款计算器</a>
    </div>
  </div>

  <footer class="site-footer">
    <p>© <span id="year"></span> 实用工具箱 · <a href="index.html">返回首页</a> · <a href="privacy.html">隐私政策</a> · <a href="ads.html">广告合作</a></p>
  </footer>

  <script>
  function fmt(n) { return '¥' + (Math.round(n * 100) / 100).toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
  function calc() {
    var P = parseFloat(amount.value) * 10000;
    var annual = parseFloat(rate.value) / 100;
    var n = parseInt(years.value, 10) * 12;
    var r = annual / 12;
    var res = document.getElementById('result');
    if (!(P > 0) || !(n > 0)) { res.textContent = '请输入有效的贷款金额与年限。'; return; }

    if (method.value === 'emi') {
      var f = Math.pow(1 + r, n);
      var M = r === 0 ? P / n : P * r * f / (f - 1);
      var total = M * n;
      var interest = total - P;
      res.innerHTML =
        '<span class="big">' + fmt(M) + ' / 月</span>' +
        '<div class="line"><span class="k">还款总额</span><span class="v">' + fmt(total) + '</span></div>' +
        '<div class="line"><span class="k">利息总额</span><span class="v hl">' + fmt(interest) + '</span></div>' +
        '<div class="line"><span class="k">还款月数</span><span class="v">' + n + ' 期</span></div>';
    } else {
      var perMonth = P / n;
      var first = perMonth + P * r;
      var decrease = perMonth * r;
      var last = perMonth + perMonth * r;
      var interest2 = P * r * (n + 1) / 2;
      var total2 = P + interest2;
      res.innerHTML =
        '<span class="big">' + fmt(first) + ' / 首月</span>' +
        '<div class="line"><span class="k">每月递减</span><span class="v">' + fmt(decrease) + '</span></div>' +
        '<div class="line"><span class="k">末月还款</span><span class="v">' + fmt(last) + '</span></div>' +
        '<div class="line"><span class="k">还款总额</span><span class="v">' + fmt(total2) + '</span></div>' +
        '<div class="line"><span class="k">利息总额</span><span class="v hl">' + fmt(interest2) + '</span></div>' +
        '<div class="line"><span class="k">还款月数</span><span class="v">' + n + ' 期</span></div>';
    }
  }
  document.getElementById('calcBtn').addEventListener('click', calc);
  document.getElementById('resetBtn').addEventListener('click', function () {
    amount.value = 100; rate.value = 4.2; years.value = 30; method.value = 'emi';
    document.getElementById('result').textContent = '请输入参数后点击「计算」。';
  });
  document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
