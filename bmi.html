  <div class="calc-page">
    <div class="calc-card">
      <h1 class="calc-title">⚖️ BMI 计算器</h1>
      <p class="calc-desc">输入身高与体重，计算您的 BMI 指数、体型分类及健康体重范围（依据中国成人标准）。</p>

      <div class="calc-grid">
        <div class="calc-field">
          <label>身高（cm）</label>
          <input type="number" id="height" value="170" min="50" max="250" step="0.1" />

        <div class="calc-field">
          <label>体重（kg）</label>
          <input type="number" id="weight" value="65" min="10" max="300" step="0.1" />
        </div>
      </div>

      <div class="btn-row">
        <button class="btn" id="calcBtn">计算</button>
        <button class="btn btn-ghost" id="resetBtn">重置</button>
      </div>

      <div class="calc-result" id="result">请输入身高体重后点击「计算」。</div>

      <p class="calc-note">
        中国成人 BMI 标准：&lt;18.5 偏瘦；18.5–23.9 正常；24–27.9 超重；≥28 肥胖。本结果仅供参考，肌肉量、年龄、性别等会影响实际健康评估。

  <script>
  function calc() {
    var h = parseFloat(height.value) / 100;
    var w = parseFloat(weight.value);
    var res = document.getElementById('result');
    if (!(h > 0) || !(w > 0)) { res.textContent = '请输入有效的身高与体重。'; return; }
    var bmi = w / (h * h);
    var cat, cls;
    if (bmi < 18.5) { cat = '偏瘦'; }
    else if (bmi < 24) { cat = '正常'; }
    else if (bmi < 28) { cat = '超重'; }
    else { cat = '肥胖'; }
    var lo = 18.5 * h * h, hi = 23.9 * h * h;
    res.innerHTML =
      '<span class="big">' + bmi.toFixed(1) + '</span>' +
      '<div class="line"><span class="k">体型分类</span><span class="v hl">' + cat + '</span></div>' +
      '<div class="line"><span class="k">健康体重范围</span><span class="v">' + lo.toFixed(1) + ' – ' + hi.toFixed(1) + ' kg</span></div>';
  }
  document.getElementById('calcBtn').addEventListener('click', calc);
  document.getElementById('resetBtn').addEventListener('click', function () {
    height.value = 170; weight.value = 65;
    document.getElementById('result').textContent = '请输入身高体重后点击「计算」。';
  });
  document.getElementById('year').textContent = new Date().getFullYear();
